# Part 2 用 volta-gateway 設定
# auth backend は dev auth-proxy (:27070)、backend は todo-sample (:27743)

server:
  port: 28888

auth:
  volta_url: http://localhost:27070       # dev auth-proxy
  verify_path: /auth/verify
  timeout_ms: 1000                       # auth-proxy が JWT 生成するので少し長め
  pool_max_idle: 32

routing:
  - host: localhost
    backend: http://localhost:27743       # todo-sample
    app_id: app-todo

healthcheck:
  interval_secs: 30
  path: /healthz

logging:
  level: info
  format: pretty
