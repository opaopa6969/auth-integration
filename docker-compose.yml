# =============================================================================
# auth-integration Part 2 — docker-compose 一式
#
#   volta-gateway (:28888 唯一の入口)
#     ├─ /todos など       → todo-sample (要認証)
#     ├─ /login /auth ...   → volta-auth-proxy (認証ページ/API, 認証スキップ)
#     └─ console.localhost  → volta-auth-console (admin SPA)
#   volta-auth-proxy → postgres / mailpit
#
# 使い方:
#   0. ./setup.sh           兄弟ディレクトリに volta-* / todo-sample を clone
#   1. ./dev/gen-dev-env.sh  JWT 鍵 + dev/auth-proxy-dev.env を生成 (冪等)
#   2. docker compose up --build
#   3. ブラウザ  http://localhost:28888/        (todo)
#                http://console.localhost:28888/ (admin console)
#      mailpit   http://localhost:28025/         (届いたメール)
#
# 詳細は 30-docker-compose化.md 参照。
# =============================================================================

services:

  # ── PostgreSQL (dev 独立) ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-p", "25432"]   # 既定 5432 ではなく新ポートで listen
    environment:
      POSTGRES_DB:       volta_auth
      POSTGRES_USER:     volta
      POSTGRES_PASSWORD: volta
    ports:
      - "25432:25432"           # ホストからも覗けるように
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volta -d volta_auth -p 25432"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  # ── Redis (auth イベント / tramli-viz telemetry の publish 先) ──
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--port", "26379"]   # 既定 6379 ではなく新ポート
    restart: unless-stopped

  # ── Mailpit (SMTP catcher) ────────────────────────────────
  mailpit:
    image: axllent/mailpit:v1.22
    environment:
      MP_UI_BIND_ADDR:   "0.0.0.0:28025"   # 既定 8025 ではなく新ポート (Web UI)
      MP_SMTP_BIND_ADDR: "0.0.0.0:21025"   # 既定 1025 ではなく新ポート (SMTP)
    ports:
      - "28025:28025"            # Web UI
    restart: unless-stopped

  # ── volta-auth-proxy (本物の認証 backend / Java) ──────────
  # org.unlaxer:tramli を Maven Central に公開済みなので、ソースから
  # 完全自己完結ビルドできる (2025-06 に 3.7.1 を deploy)。
  #   build stage : maven で fat jar を package (tramli は Central から解決)
  #   runtime     : JDK ランタイム。JTE は実行時コンパイルなので
  #                 javac (JDK) + src/main/jte の同梱が要る (Main.java:72)
  auth-proxy:
    build:
      context: ${AUTH_PROXY_SRC:-../volta-auth-proxy}
      dockerfile_inline: |
        FROM maven:3.9-eclipse-temurin-21 AS build
        WORKDIR /src
        COPY pom.xml .
        RUN mvn -B -DskipTests dependency:go-offline || true
        COPY src ./src
        RUN mvn -B -DskipTests clean package
        FROM eclipse-temurin:21-jdk
        WORKDIR /app
        COPY --from=build /src/target/volta-auth-proxy-0.3.0-SNAPSHOT.jar /app/app.jar
        # JTE テンプレートは jar に含まれず FS から読むので runtime に同梱
        COPY --from=build /src/src/main/jte /app/src/main/jte
        EXPOSE 27070
        CMD ["java", "-jar", "/app/app.jar"]
    working_dir: /app
    env_file:
      - ./dev/auth-proxy-dev.env      # 秘密 (JWT 鍵 / secret) を流用
      - ./docker/auth-proxy.docker.env # docker 向けの上書き (非秘密)
    volumes:
      - ./docker/volta-config-docker.yaml:/app/volta-config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/27070' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30           # 初回はマイグレーション + 起動で数十秒かかる
      start_period: 90s
    restart: unless-stopped

  # ── todo-sample (対象アプリ / Java + Jetty) ───────────────
  todo-sample:
    build:
      context: ../todo-sample
      dockerfile_inline: |
        FROM maven:3.9-eclipse-temurin-17
        WORKDIR /app
        COPY pom.xml .
        # pom の httpConnector port は 27743 に統一済み (サンプル pom 側で直接設定)。
        # jetty プラグイン本体も含め依存をビルド時に取得 (実行時のDLを無くす)
        RUN mvn -B dependency:resolve dependency:resolve-plugins \
                org.eclipse.jetty:jetty-maven-plugin:11.0.20:help || true
        COPY src ./src
        EXPOSE 27743
        # -q を付けない: 付けると Jetty 起動ログもエラーも消えてデバッグ不能になる
        CMD ["mvn", "-B", "jetty:run"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/27743' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # ── volta-auth-console (admin SPA / 静的配信) ─────────────
  # file:../DxE-suite 依存のため in-docker で npm build できない。
  # ホストでビルド済みの dist/ を nginx で配る。
  #   再ビルド: cd ../volta-auth-console && npm run build
  console:
    build:
      context: ../volta-auth-console
      dockerfile_inline: |
        FROM nginx:1.27-alpine
        COPY dist /usr/share/nginx/html
    volumes:
      - ./docker/console.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      auth-proxy:
        condition: service_started
    restart: unless-stopped

  # ── volta-gateway (唯一の入口 / Rust) ─────────────────────
  gateway:
    build:
      context: ../volta-gateway
      dockerfile_inline: |
        FROM rust:1-bookworm AS build
        WORKDIR /src
        COPY . .
        RUN cargo build --release -p volta-gateway
        FROM debian:bookworm-slim
        RUN apt-get update \
         && apt-get install -y --no-install-recommends ca-certificates curl libssl3 \
         && rm -rf /var/lib/apt/lists/*
        COPY --from=build /src/target/release/volta-gateway /usr/local/bin/volta-gateway
        EXPOSE 28888
        ENTRYPOINT ["volta-gateway"]
        CMD ["/etc/volta/todo-gateway.yaml"]
    ports:
      - "28888:28888"            # 唯一外に開けるポート
    volumes:
      - ./docker/todo-gateway-docker.yaml:/etc/volta/todo-gateway.yaml:ro
    depends_on:
      auth-proxy:
        condition: service_healthy
      todo-sample:
        condition: service_started
      console:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:28888/login -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata:
