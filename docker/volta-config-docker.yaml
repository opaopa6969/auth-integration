version: 1

# Part 2 (独自 DB) では外部 IdP は使わない。
# Magic Link / Passkey / Invite だけで認証する。
idp: []

apps:
  - id: app-todo
    # ブラウザ/ curl から見える公開 URL。docker でも入口は gateway :28888。
    url: http://localhost:28888
    allowed_roles: [MEMBER, ADMIN, OWNER]

  - id: app-console
    url: http://console.localhost:28888
    allowed_roles: [ADMIN, OWNER]
