# volta-auth-console — docker 配信用 nginx
#
# console.localhost:8888 で SPA を base=/ で配る。
# SPA からの認証系 API (/api /auth ...) はこの nginx が auth-proxy へ proxy する。
# (gateway は console.localhost を public route として素通しするだけ)
#
# service 名は docker 組み込み DNS (127.0.0.11) で実行時解決する。
# 変数経由の proxy_pass にすることで、起動時に auth-proxy が未起動でも
# nginx 自体は立ち上がる。

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s;
    set $authproxy http://auth-proxy:7070;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── auth-proxy へ中継するパス群 ──────────────────────
    location /api/          { proxy_pass $authproxy; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location /auth/         { proxy_pass $authproxy; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; }
    location /login         { proxy_pass $authproxy; proxy_set_header Host $host; }
    location /logout        { proxy_pass $authproxy; proxy_set_header Host $host; }
    location /callback      { proxy_pass $authproxy; proxy_set_header Host $host; }
    location /select-tenant { proxy_pass $authproxy; proxy_set_header Host $host; }
    location /healthz       { proxy_pass $authproxy; }
    location /.well-known/  { proxy_pass $authproxy; proxy_set_header Host $host; }
    location /css/          { proxy_pass $authproxy; }
    location /js/           { proxy_pass $authproxy; }
}
